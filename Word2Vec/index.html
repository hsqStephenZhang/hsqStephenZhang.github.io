<html>

<head>
    <style>
        body {
            background-image: url("../images/geometric-leaves.png");
            background-repeat: no-repeat;
            background-size:cover;
        }

        title {
            font-family: "Consolas";
            font-size: xx-large;
        }

        input[type="text"], #btn1, #btn2 {
            box-sizing: border-box;
            text-align: center;
            font-size: 0.96em;
            height: 2em;
            border-radius: 4px;
            border: 1px solid #c8cccf;
            color: #6a6f77;
            -web-kit-appearance: none;
            -moz-appearance: none;
            display: block;
            outline: 0;
            padding: 0 1em;
            text-decoration: none;
            width: 20%;
        }

        input {
            background-color: #a8b6bf;
            display: inline-block;
            text-align: center;
        }

        .text {
            font-size: x-large;
            font-family: "Microsoft YaHei";
        }

        .result{
            font-size: 0.96em;
            color: #8781bd;
        }

        .btn2 {
            border: none;
            background-color: #7d4627;
            color: white;
            font-size: 0.96em;
            height: 2em;
            margin-top: 0.5em;
            width: 20%;
            border-radius: 1em;
        }
    </style>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title style="font-size: 3.0em">Word2Vec example. Using a pre-trained model on common English words.</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.8.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.8.0/addons/p5.dom.min.js"></script>
    <script src="https://unpkg.com/ml5@0.3.1/dist/ml5.min.js" type="text/javascript"></script>
</head>

<body>
<h1 style="text-align: center; font-size: 3.0em">Word2Vec example. Using a pre-trained model</h1>
<p id='status' style="font-size: x-large;text-align: center">Loading Model...</p>
<div style="text-align: center;font-weight: bold">
    <div class="row">
        <p class="text">
            <input type="text" value="rainbow" id="nearword" style="display:inline">
            <button id="submit" class="btn2">is nearest to ...</button>
        </p>
        <p id="results" class="result" style="font-size: 2em;font-weight: bolder"></p>
    </div>

    <div class="row" style="text-align: center;font-weight: bold">
        <p class="text" >
            Between
            <input type="text" value="rainbow" id="between1" style="display:inline;font-weight: bold"> and
            <input type="text" value="kitten" id="between2" style="display:inline;font-weight: bold">
            <button id="submit2" class="btn2">is ...</button>
        </p>
        <p id="results2" class="result" style="font-size: 1.8em;color: #ff3f12;font-weight: bolder"></p>
    </div>

    <div class="row" style="text-align: center;font-weight: bold">
        <p class="text">
            <input type="text" value="pizza" id="isto1" style="display:inline"> is to
            <input type="text" value="humans" id="isto2" style="display:inline"> as
            <input type="text" value="fish" id="isto3" style="display:inline">
            <button id="submit3" class="btn2">is to ...</button>
        </p>
        <p id="results3" class="result" style="font-size: 1.8em;font-weight: bolder;color: #e0cb22"></p>
    </div>
</div>

<script src="sketch.js"></script>

</body>

</html>
